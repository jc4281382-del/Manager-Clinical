<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manager Clinic - Home</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005258">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        primary:"#005258", "primary-container":"#1a6b72", surface:"#f7fafa",
        "on-surface":"#191c1d", "on-surface-variant":"#3f484a",
        secondary:"#006c48", error:"#ba1a1a", outline:"#6f797a",
        "surface-container":"#eceeee","surface-container-low":"#f2f4f4",
        "outline-variant":"#bec8c9"
      }, fontFamily:{body:["Manrope"]} } }
    }
  </script>
  <style>
    body { font-family:'Manrope',sans-serif; background:#f7fafa; min-height:100dvh; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  </style>
</head>
<body class="text-on-surface pb-28">
  <header class="flex justify-between items-center w-full px-4 py-3 sticky top-0 z-50 bg-white shadow-sm border-b border-slate-100">
    <div class="flex items-center gap-3">
      <button id="btnHamburger" class="p-1.5 rounded-xl hover:bg-slate-100 transition-colors active:scale-95">
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <div class="w-9 h-9 rounded-full overflow-hidden border-2 border-primary-container">
        <img id="profilePhoto" src="https://ui-avatars.com/api/?name=P&background=1a6b72&color=fff" class="w-full h-full object-cover" alt="Perfil">
      </div>
      <span class="font-extrabold text-primary text-lg tracking-tight">Manager Clinic</span>
    </div>
    <div class="flex items-center gap-1">
      <button id="btnSearch" class="p-2 rounded-xl hover:bg-slate-100 transition-colors">
        <span class="material-symbols-outlined text-slate-500">search</span>
      </button>
    </div>
  </header>
  <main class="max-w-2xl mx-auto px-4 pt-6">
    <section class="mb-6">
      <div class="flex justify-between items-start">
        <div>
          <h1 id="greetingName" class="text-2xl font-extrabold text-primary">Olá, Profissional</h1>
          <p id="currentDate" class="text-on-surface-variant text-sm mt-0.5"></p>
        </div>
        <button id="btnNovoAgendamento" class="flex items-center gap-1.5 bg-primary-container text-white px-4 py-2.5 rounded-xl font-bold shadow-lg active:scale-95 transition-transform text-sm">
          <span class="material-symbols-outlined text-[18px]">add</span> Agendar
        </button>
      </div>
    </section>
    <div id="searchBar" class="hidden mb-4">
      <input id="searchInput" type="text" placeholder="Buscar paciente pelo nome..." class="w-full rounded-xl border border-outline-variant py-2.5 px-4 text-sm focus:border-primary outline-none bg-white shadow-sm">
    </div>
    <div class="flex gap-2 mb-5 overflow-x-auto pb-1" style="scrollbar-width:none">
      <button class="day-filter-btn flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-colors" data-day="seg">Seg</button>
      <button class="day-filter-btn flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-colors" data-day="ter">Ter</button>
      <button class="day-filter-btn flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-colors" data-day="qua">Qua</button>
      <button class="day-filter-btn flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-colors" data-day="qui">Qui</button>
      <button class="day-filter-btn flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-colors" data-day="sex">Sex</button>
      <button class="day-filter-btn flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-colors" data-day="sab">Sáb</button>
      <button class="day-filter-btn flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-colors" data-day="dom">Dom</button>
    </div>
    <section class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6">
      <div class="col-span-2 sm:col-span-1 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
        <p class="text-xs font-bold text-on-surface-variant">Hoje</p>
        <p id="statTotal" class="text-3xl font-extrabold text-primary mt-2">00</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
        <p class="text-xs font-bold text-on-surface-variant">Faturamento</p>
        <p id="statRevenue" class="text-lg font-extrabold text-primary mt-2">R$ 0,00</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-secondary border border-slate-100">
        <p class="text-xs font-bold text-on-surface-variant">Realizados</p>
        <p id="statRealizados" class="text-3xl font-extrabold text-secondary mt-2">00</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-error border border-slate-100">
        <p class="text-xs font-bold text-on-surface-variant">Cancelados</p>
        <p id="statCancelados" class="text-3xl font-extrabold text-error mt-2">00</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-slate-400 border border-slate-100">
        <p class="text-xs font-bold text-on-surface-variant">Faltou</p>
        <p id="statFaltou" class="text-3xl font-extrabold text-slate-500 mt-2">00</p>
      </div>
    </section>
    <section class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="px-4 py-4 border-b border-slate-100">
        <h2 class="text-base font-bold text-primary">Compromissos de Hoje</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead>
            <tr class="bg-slate-50 text-on-surface-variant text-xs font-bold uppercase tracking-wide">
              <th class="px-4 py-3">Hora</th>
              <th class="px-4 py-3">Paciente</th>
              <th class="px-4 py-3">Valor</th>
              <th class="px-4 py-3">Status</th>
              <th class="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody id="appointmentsTbody" class="divide-y divide-slate-50">
            <tr><td colspan="5" class="px-4 py-10 text-center text-on-surface-variant">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/90 backdrop-blur-md border-t border-slate-100 shadow-lg rounded-t-2xl">
    <a href="dashboard.html" class="flex flex-col items-center bg-teal-50 text-primary rounded-xl px-4 py-1.5 active:scale-90 transition-transform">
      <span class="material-symbols-outlined text-[22px]" style="font-variation-settings:'FILL' 1">home</span>
      <span class="text-[11px] font-bold">Home</span>
    </a>
    <a href="agenda.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[22px]">calendar_month</span>
      <span class="text-[11px] font-medium">Agenda</span>
    </a>
    <a href="pacientes.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[22px]">groups</span>
      <span class="text-[11px] font-medium">Pacientes</span>
    </a>
    <a href="financeiro.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[22px]">bar_chart</span>
      <span class="text-[11px] font-medium">Relatórios</span>
    </a>
  </nav>
  <script src="js/supabase.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
