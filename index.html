<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Manager Clinic - Login</title>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#005258">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Manager Clinic">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Supabase & SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#005258",
                        "primary-container": "#1a6b72",
                        surface: "#f7fafa",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#3f484a",
                        outline: "#6f797a",
                        error: "#ba1a1a"
                    },
                    fontFamily: { body: ["Manrope"] }
                }
            }
        }
    </script>
    <style>body { font-family: 'Manrope', sans-serif; background-color: #f7fafa; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-80 h-80 bg-[#1a6b72]/10 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl z-10 border border-[#EEF2F5]">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-primary tracking-tight">Manager Clinic</h1>
            <p class="text-on-surface-variant mt-2" id="subtitle">Entre para gerenciar sua clínica</p>
        </div>

        <!-- Login Form -->
        <form id="authForm" class="space-y-5">
            <div id="nameField" class="hidden">
                <label class="block text-sm font-bold text-on-surface-variant mb-1">Nome do Profissional</label>
                <input type="text" id="name" class="w-full rounded-xl border-outline/30 focus:border-primary focus:ring-primary py-3 px-4 transition-all" placeholder="Dr. João Silva">
            </div>
            <div>
                <label class="block text-sm font-bold text-on-surface-variant mb-1">E-mail</label>
                <input type="email" id="email" required class="w-full rounded-xl border-outline/30 focus:border-primary focus:ring-primary py-3 px-4 transition-all" placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-sm font-bold text-on-surface-variant mb-1">Senha</label>
                <input type="password" id="password" required minlength="6" class="w-full rounded-xl border-outline/30 focus:border-primary focus:ring-primary py-3 px-4 transition-all" placeholder="••••••••">
            </div>
            <div id="confirmPasswordField" class="hidden">
                <label class="block text-sm font-bold text-on-surface-variant mb-1">Confirme a Senha</label>
                <input type="password" id="confirmPassword" class="w-full rounded-xl border-outline/30 focus:border-primary focus:ring-primary py-3 px-4 transition-all" placeholder="••••••••">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-primary text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-primary-container active:scale-[0.98] transition-all text-lg mt-4">
                Entrar
            </button>
        </form>

        <div class="mt-8 text-center">
            <button id="toggleModeBtn" class="text-primary font-bold hover:underline">
                Ainda não tem conta? Cadastre-se
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/supabase.js"></script>
    <script>
        let isLogin = true;
        
        const form = document.getElementById('authForm');
        const nameField = document.getElementById('nameField');
        const confirmPasswordField = document.getElementById('confirmPasswordField');
        const submitBtn = document.getElementById('submitBtn');
        const toggleModeBtn = document.getElementById('toggleModeBtn');
        const subtitle = document.getElementById('subtitle');

        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkSession();

        toggleModeBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                nameField.classList.add('hidden');
                document.getElementById('name').removeAttribute('required');
                confirmPasswordField.classList.add('hidden');
                document.getElementById('confirmPassword').removeAttribute('required');
                submitBtn.innerText = 'Entrar';
                subtitle.innerText = 'Entre para gerenciar sua clínica';
                toggleModeBtn.innerText = 'Ainda não tem conta? Cadastre-se';
            } else {
                nameField.classList.remove('hidden');
                document.getElementById('name').setAttribute('required', 'true');
                confirmPasswordField.classList.remove('hidden');
                document.getElementById('confirmPassword').setAttribute('required', 'true');
                submitBtn.innerText = 'Criar Conta';
                subtitle.innerText = 'Crie sua conta profissional';
                toggleModeBtn.innerText = 'Já tem uma conta? Entre aqui';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'Aguarde...';

            if (isLogin) {
                // LOGIN
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    Swal.fire({ icon: 'error', title: 'Erro ao entrar', text: error.message });
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Entrar';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                // SIGN UP
                const name = document.getElementById('name').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (password !== confirmPassword) {
                    Swal.fire({ icon: 'warning', title: 'Atenção', text: 'As senhas não coincidem!' });
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Criar Conta';
                    return;
                }

                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: { data: { full_name: name } }
                });

                if (error) {
                    Swal.fire({ icon: 'error', title: 'Erro no Cadastro', text: error.message });
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Criar Conta';
                } else {
                    // Cuidamos de inserir o profissional na tabela professionals se precisar, 
                    // Mas podemos fazer no banco via trigger ou no cliente. Vamos fazer no cliente agora para garantir.
                    if(data.user) {
                        await supabase.from('professionals').insert([{
                            user_id: data.user.id,
                            full_name: name,
                            email: email
                        }]);
                        
                        Swal.fire({ icon: 'success', title: 'Conta Criada!', text: 'Bem-vindo ao Manager Clinic.' }).then(() => {
                            window.location.href = 'dashboard.html';
                        });
                    }
                }
            }
        });
    </script>
</body>
</html>
