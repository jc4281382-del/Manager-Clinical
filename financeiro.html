<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manager Clinic - Relatórios</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005258">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      primary:"#005258","primary-container":"#1a6b72",surface:"#f7fafa",
      "on-surface":"#191c1d","on-surface-variant":"#3f484a",
      secondary:"#006c48",error:"#ba1a1a",outline:"#6f797a",
      "surface-container":"#eceeee","outline-variant":"#bec8c9"
    }, fontFamily:{body:["Manrope"]} } } }
  </script>
  <style>
    body { font-family:'Manrope',sans-serif; background:#f7fafa; min-height:100dvh; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  </style>
</head>
<body class="text-on-surface pb-28">

  <!-- Header -->
  <header class="flex justify-between items-center w-full px-4 py-3 sticky top-0 z-50 bg-white shadow-sm border-b border-slate-100">
    <div class="flex items-center gap-3">
      <button id="btnHamburger" class="p-1.5 rounded-xl hover:bg-slate-100 active:scale-95">
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <div class="w-9 h-9 rounded-full overflow-hidden border-2 border-primary-container">
        <img id="profilePhoto" src="https://ui-avatars.com/api/?name=P&background=1a6b72&color=fff" class="w-full h-full object-cover" alt="Perfil">
      </div>
      <span class="font-extrabold text-primary text-lg">Relatórios</span>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pt-5 space-y-5">

    <!-- Filtros de Período -->
    <div class="flex gap-2 flex-wrap">
      <button class="period-btn text-sm font-bold px-4 py-2 rounded-xl border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-colors" data-period="hoje">Hoje</button>
      <button class="period-btn text-sm font-bold px-4 py-2 rounded-xl border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-colors" data-period="semana">Semana</button>
      <button class="period-btn bg-primary text-white text-sm font-bold px-4 py-2 rounded-xl border border-primary" data-period="mes">Mês</button>
    </div>

    <!-- Período Personalizado -->
    <div class="bg-white rounded-xl border border-slate-100 p-4 shadow-sm flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-[130px]">
        <label class="text-xs font-bold text-on-surface-variant block mb-1">De</label>
        <input type="date" id="dateFrom" class="w-full rounded-xl border border-outline-variant py-2 px-3 text-sm focus:border-primary outline-none">
      </div>
      <div class="flex-1 min-w-[130px]">
        <label class="text-xs font-bold text-on-surface-variant block mb-1">Até</label>
        <input type="date" id="dateTo" class="w-full rounded-xl border border-outline-variant py-2 px-3 text-sm focus:border-primary outline-none">
      </div>
      <button id="btnCustomPeriod" class="flex items-center gap-1.5 bg-primary-container text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-primary transition-colors">
        <span class="material-symbols-outlined text-[16px]">search</span> Filtrar
      </button>
    </div>

    <!-- Cards Principais -->
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-gradient-to-br from-emerald-500 to-emerald-600 rounded-2xl p-5 text-white shadow-lg">
        <p class="text-sm font-bold opacity-80">Total Recebido</p>
        <p id="finRecebido" class="text-2xl font-extrabold mt-2">R$ 0,00</p>
        <p class="text-xs opacity-70 mt-1">Consultas realizadas</p>
      </div>
      <div class="bg-gradient-to-br from-red-500 to-red-600 rounded-2xl p-5 text-white shadow-lg">
        <p class="text-sm font-bold opacity-80">Total Perdido</p>
        <p id="finPerdido" class="text-2xl font-extrabold mt-2">R$ 0,00</p>
        <p class="text-xs opacity-70 mt-1">Cancelamentos + Faltas</p>
      </div>
    </div>

    <!-- Stats Secundárias -->
    <div class="grid grid-cols-4 gap-2">
      <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
        <p class="text-xs text-on-surface-variant font-bold">Total</p>
        <p id="finTotal" class="text-xl font-extrabold text-primary">0</p>
      </div>
      <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
        <p class="text-xs text-on-surface-variant font-bold">Realizados</p>
        <p id="finRealizados" class="text-xl font-extrabold text-emerald-600">0</p>
      </div>
      <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
        <p class="text-xs text-on-surface-variant font-bold">Cancelados</p>
        <p id="finCancelados" class="text-xl font-extrabold text-error">0</p>
      </div>
      <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
        <p class="text-xs text-on-surface-variant font-bold">Faltou</p>
        <p id="finFaltou" class="text-xl font-extrabold text-amber-600">0</p>
      </div>
    </div>

    <!-- Período exibido -->
    <p class="text-xs text-on-surface-variant text-center">Período: <span id="finPeriodo" class="font-bold text-primary">—</span></p>

    <!-- Tabela Detalhada -->
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100">
        <h3 class="font-bold text-primary text-sm">Detalhamento</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-slate-50 text-xs font-bold text-on-surface-variant uppercase tracking-wide">
              <th class="px-4 py-3">Data</th>
              <th class="px-4 py-3">Paciente</th>
              <th class="px-4 py-3">Tipo</th>
              <th class="px-4 py-3">Valor</th>
              <th class="px-4 py-3">Status</th>
            </tr>
          </thead>
          <tbody id="finTbody" class="divide-y divide-slate-50 text-sm">
            <tr><td colspan="5" class="px-4 py-8 text-center text-on-surface-variant">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/90 backdrop-blur-md border-t border-slate-100 shadow-lg rounded-t-2xl">
    <a href="dashboard.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[22px]">home</span>
      <span class="text-[11px] font-medium">Home</span>
    </a>
    <a href="agenda.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[22px]">calendar_month</span>
      <span class="text-[11px] font-medium">Agenda</span>
    </a>
    <a href="pacientes.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[22px]">groups</span>
      <span class="text-[11px] font-medium">Pacientes</span>
    </a>
    <a href="financeiro.html" class="flex flex-col items-center bg-teal-50 text-primary rounded-xl px-4 py-1.5 active:scale-90">
      <span class="material-symbols-outlined text-[22px]" style="font-variation-settings:'FILL' 1">bar_chart</span>
      <span class="text-[11px] font-bold">Relatórios</span>
    </a>
  </nav>

  <script src="js/supabase.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/financeiro.js"></script>
</body>
</html>
