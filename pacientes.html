<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manager Clinic - Pacientes</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005258">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      primary:"#005258","primary-container":"#1a6b72",surface:"#f7fafa",
      "on-surface":"#191c1d","on-surface-variant":"#3f484a",
      secondary:"#006c48",error:"#ba1a1a",outline:"#6f797a",
      "surface-container":"#eceeee","outline-variant":"#bec8c9"
    }, fontFamily:{body:["Manrope"]} } } }
  </script>
  <style>body{font-family:'Manrope',sans-serif;background:#f7fafa;min-height:100dvh;}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}.kanban-col{min-width:220px;max-width:260px;}</style>
</head>
<body class="text-on-surface pb-28">
  <header class="flex justify-between items-center w-full px-4 py-3 sticky top-0 z-50 bg-white shadow-sm border-b border-slate-100">
    <div class="flex items-center gap-3">
      <button id="btnHamburger" class="p-1.5 rounded-xl hover:bg-slate-100 active:scale-95"><span class="material-symbols-outlined text-primary">menu</span></button>
      <div class="w-9 h-9 rounded-full overflow-hidden border-2 border-primary-container"><img id="profilePhoto" src="https://ui-avatars.com/api/?name=P&background=1a6b72&color=fff" class="w-full h-full object-cover" alt="Perfil"></div>
      <span class="font-extrabold text-primary text-lg">Pacientes</span>
    </div>
    <button id="btnNovoPaciente" class="flex items-center gap-1 bg-primary-container text-white px-3 py-2 rounded-xl font-bold text-sm active:scale-95 transition-transform"><span class="material-symbols-outlined text-[16px]">add</span> Novo</button>
  </header>
  <main class="px-4 pt-5">
    <div class="flex gap-4 overflow-x-auto pb-6" style="scrollbar-width:none">
      <div class="kanban-col flex-shrink-0"><div class="flex items-center gap-2 mb-3"><div class="w-3 h-3 rounded-full bg-slate-400"></div><h3 class="font-bold text-sm text-on-surface-variant">Agendado</h3><span id="count-Agendado" class="ml-auto text-xs font-bold bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">0</span></div><div id="col-Agendado" class="space-y-2 min-h-[100px]"></div></div>
      <div class="kanban-col flex-shrink-0"><div class="flex items-center gap-2 mb-3"><div class="w-3 h-3 rounded-full bg-blue-500"></div><h3 class="font-bold text-sm text-on-surface-variant">Confirmado</h3><span id="count-Confirmado" class="ml-auto text-xs font-bold bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">0</span></div><div id="col-Confirmado" class="space-y-2 min-h-[100px]"></div></div>
      <div class="kanban-col flex-shrink-0"><div class="flex items-center gap-2 mb-3"><div class="w-3 h-3 rounded-full bg-emerald-500"></div><h3 class="font-bold text-sm text-on-surface-variant">Realizado</h3><span id="count-Realizado" class="ml-auto text-xs font-bold bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full">0</span></div><div id="col-Realizado" class="space-y-2 min-h-[100px]"></div></div>
      <div class="kanban-col flex-shrink-0"><div class="flex items-center gap-2 mb-3"><div class="w-3 h-3 rounded-full bg-red-500"></div><h3 class="font-bold text-sm text-on-surface-variant">Cancelado</h3><span id="count-Cancelado" class="ml-auto text-xs font-bold bg-red-50 text-red-700 px-2 py-0.5 rounded-full">0</span></div><div id="col-Cancelado" class="space-y-2 min-h-[100px]"></div></div>
      <div class="kanban-col flex-shrink-0"><div class="flex items-center gap-2 mb-3"><div class="w-3 h-3 rounded-full bg-amber-500"></div><h3 class="font-bold text-sm text-on-surface-variant">Faltou</h3><span id="count-Faltou" class="ml-auto text-xs font-bold bg-amber-50 text-amber-700 px-2 py-0.5 rounded-full">0</span></div><div id="col-Faltou" class="space-y-2 min-h-[100px]"></div></div>
    </div>
  </main>
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/90 backdrop-blur-md border-t border-slate-100 shadow-lg rounded-t-2xl">
    <a href="dashboard.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90"><span class="material-symbols-outlined text-[22px]">home</span><span class="text-[11px] font-medium">Home</span></a>
    <a href="agenda.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90"><span class="material-symbols-outlined text-[22px]">calendar_month</span><span class="text-[11px] font-medium">Agenda</span></a>
    <a href="pacientes.html" class="flex flex-col items-center bg-teal-50 text-primary rounded-xl px-4 py-1.5 active:scale-90"><span class="material-symbols-outlined text-[22px]" style="font-variation-settings:'FILL' 1">groups</span><span class="text-[11px] font-bold">Pacientes</span></a>
    <a href="financeiro.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90"><span class="material-symbols-outlined text-[22px]">bar_chart</span><span class="text-[11px] font-medium">Relatórios</span></a>
  </nav>
  <script src="js/supabase.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/pacientes.js"></script>
</body>
</html>
