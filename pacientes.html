<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manager Clinic - Pacientes</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005258">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      primary:"#005258","primary-container":"#1a6b72",surface:"#f7fafa",
      "on-surface":"#191c1d","on-surface-variant":"#3f484a",
      secondary:"#006c48",error:"#ba1a1a",outline:"#6f797a",
      "surface-container":"#eceeee","outline-variant":"#bec8c9"
    }, fontFamily:{body:["Manrope"]} } } }
  </script>
  <style>
    body { font-family:'Manrope',sans-serif; background:#f7fafa; min-height:100dvh; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  </style>
</head>
<body class="text-on-surface pb-28">

  <!-- Header -->
  <header class="flex justify-between items-center w-full px-4 py-3 sticky top-0 z-50 bg-white shadow-sm border-b border-slate-100">
    <div class="flex items-center gap-3">
      <button id="btnHamburger" class="p-1.5 rounded-xl hover:bg-slate-100 active:scale-95">
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <div class="w-9 h-9 rounded-full overflow-hidden border-2 border-primary-container">
        <img id="profilePhoto" src="https://ui-avatars.com/api/?name=P&background=1a6b72&color=fff" class="w-full h-full object-cover" alt="Perfil">
      </div>
      <span class="font-extrabold text-primary text-lg">Pacientes</span>
    </div>
    <button id="btnNovoPaciente" class="flex items-center gap-1 bg-primary-container text-white px-3 py-2 rounded-xl font-bold text-sm active:scale-95 transition-transform">
      <span class="material-symbols-outlined text-[16px]">add</span> Novo
    </button>
  </header>

  <main class="px-4 pt-5">
    <!-- Busca de pacientes -->
    <div class="relative mb-4">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
      <input
        id="patientSearchInput"
        type="text"
        placeholder="Buscar por nome ou telefone..."
        class="w-full rounded-xl border border-slate-200 py-2.5 pl-10 pr-4 text-sm focus:border-primary outline-none bg-white shadow-sm"
      >
    </div>

    <!-- Contador -->
    <p id="patientsCount" class="text-xs font-bold text-on-surface-variant mb-4">Carregando...</p>

    <!-- Grid de pacientes únicos -->
    <div id="patientsList" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="text-center py-16 text-on-surface-variant col-span-full">
        <span class="material-symbols-outlined text-5xl opacity-30 block mb-2">group</span>
        Carregando pacientes...
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/90 backdrop-blur-md border-t border-slate-100 shadow-lg rounded-t-2xl">
    <a href="dashboard.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[22px]">home</span>
      <span class="text-[11px] font-medium">Home</span>
    </a>
    <a href="agenda.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[22px]">calendar_month</span>
      <span class="text-[11px] font-medium">Agenda</span>
    </a>
    <a href="pacientes.html" class="flex flex-col items-center bg-teal-50 text-primary rounded-xl px-4 py-1.5 active:scale-90">
      <span class="material-symbols-outlined text-[22px]" style="font-variation-settings:'FILL' 1">groups</span>
      <span class="text-[11px] font-bold">Pacientes</span>
    </a>
    <a href="financeiro.html" class="flex flex-col items-center text-slate-400 px-4 py-1.5 hover:text-primary transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[22px]">bar_chart</span>
      <span class="text-[11px] font-medium">Relatórios</span>
    </a>
  </nav>

  <script src="js/supabase.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/pacientes.js"></script>
</body>
</html>
